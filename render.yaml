services:
  - type: web
    name: ticketflow
    runtime: python
    plan: starter
    branch: main
    # No dependencies to install — TicketFlow is stdlib-only.
    buildCommand: "true"
    startCommand: "python3 run.py"

    # CRITICAL: Render's normal filesystem is wiped on every deploy. TicketFlow
    # keeps everything (events, orders, tickets) in one SQLite file, so without a
    # persistent disk every ticket you had sold would vanish on the next deploy.
    # This disk survives deploys and restarts.
    disk:
      name: ticketflow-data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      # Store the SQLite DB on the persistent disk, NOT in the app directory.
      - key: TICKETFLOW_DB
        value: /var/data/ticketflow.db

      # Event images live on the SAME persistent disk as the database — the normal
      # filesystem is wiped on every deploy, so uploads stored elsewhere would vanish.
      - key: TICKETFLOW_UPLOADS
        value: /var/data/uploads

      # Organiser dashboard password. Set a real one in the Render dashboard.
      - key: ADMIN_PASSWORD
        sync: false

      # Stripe secret key. Leave unset for mock mode; set sk_test_... to take
      # test payments, sk_live_... to take real money.
      - key: STRIPE_SECRET_KEY
        sync: false

      # Ticket emails via Resend. The sending domain must be VERIFIED in Resend:
      # phil-freeman.co.uk is verified; mayhembingo.co.uk is only a brand name, so we
      # send from the verified domain but display 'Mayhem Bingo' as the sender name.
      # Leave RESEND_API_KEY unset and tickets simply aren't emailed — buyers still
      # see and can print them.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: Mayhem Bingo <tickets@phil-freeman.co.uk>

      # tickets@ doesn't exist as a mailbox — send replies somewhere real.
      - key: MAIL_REPLY_TO
        value: phil@phil-freeman.co.uk

      # Don't create the fake demo events (jazz brunch etc) on a real ticket site.
      - key: NO_SEED
        value: "1"

      - key: PYTHON_VERSION
        value: "3.11.9"
